{% extends "base.html" %}
{% block title %}{{ 'Edit' if meeting else 'Schedule' }} Meeting{% endblock %}
{% block content %}
<div class="page-header reveal">
    <h1 class="page-title">{{ 'Edit' if meeting else 'Schedule' }} 1:1 meeting</h1>
</div>
<div class="form-page-center">
    <div class="card reveal form-card-narrow">
        <form method="post" action="{{ url_for('meetings.edit', meeting_id=meeting.id) if meeting else url_for('meetings.create') }}">
            {% if not meeting %}
            <div class="form-group">
                <label for="employee_id">Employee</label>
                <select id="employee_id" name="employee_id" class="form-control" required>
                    <option value="">Select employee</option>
                    {% for u in reports %}
                    <option value="{{ u.id }}" {% if selected_employee_id and selected_employee_id == u.id %}selected{% endif %}>{{ u.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="scheduled_at">Date & time</label>
                <input type="datetime-local" id="scheduled_at" name="scheduled_at" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="duration_minutes">Duration (minutes)</label>
                <input type="number" id="duration_minutes" name="duration_minutes" class="form-control" value="30" min="15" step="15">
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="Optional">
            </div>
            <div class="form-group">
                <label for="agenda">Agenda</label>
                <textarea id="agenda" name="agenda" class="form-control"></textarea>
            </div>
            {% else %}
            <div class="form-group">
                <label for="scheduled_at">Date & time</label>
                <input type="datetime-local" id="scheduled_at" name="scheduled_at" class="form-control" value="{{ meeting.scheduled_at.strftime('%Y-%m-%dT%H:%M') if meeting.scheduled_at else '' }}">
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" class="form-control" value="{{ meeting.title or '' }}">
            </div>
            <div class="form-group">
                <label for="agenda">Agenda</label>
                <textarea id="agenda" name="agenda" class="form-control">{{ meeting.agenda or '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" class="form-control">{{ meeting.notes or '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" class="form-control">
                    <option value="scheduled" {% if meeting.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                    <option value="completed" {% if meeting.status == 'completed' %}selected{% endif %}>Completed</option>
                    <option value="cancelled" {% if meeting.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                </select>
            </div>
            {% endif %}
            <div class="flex gap-2 mt-2">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('meetings.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
