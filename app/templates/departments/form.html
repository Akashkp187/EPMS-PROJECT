{% extends "base.html" %}
{% block title %}{{ 'Edit' if department else 'New' }} Department{% endblock %}
{% block content %}
<div class="page-header reveal">
    <h1 class="page-title">{{ 'Edit' if department else 'Create' }} department</h1>
</div>
<div class="card reveal" style="max-width: 480px;">
    <form method="post" action="{{ url_for('departments.edit', dept_id=department.id) if department else url_for('departments.create') }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" required value="{{ department.name if department else '' }}">
        </div>
        <div class="form-group">
            <label for="code">Code</label>
            <input type="text" id="code" name="code" class="form-control" value="{{ department.code if department else '' }}" placeholder="e.g. ENG">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control">{{ department.description if department else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="image_url">Image URL (optional)</label>
            <input
                type="url"
                id="image_url"
                name="image_url"
                class="form-control"
                value="{{ department.image_url if department and department.image_url else '' }}"
                placeholder="https://images.unsplash.com/..."
            >
            <small class="text-muted">Use a wide photo that represents this department (Unsplash or your own CDN).</small>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('departments.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
