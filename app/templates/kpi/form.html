{% extends "base.html" %}
{% block title %}New KPI{% endblock %}
{% block content %}
<div class="page-header reveal">
    <h1 class="page-title">Create KPI</h1>
</div>
<div class="card reveal" style="max-width: 480px;">
    <form method="post" action="{{ url_for('kpi.create') }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label for="unit">Unit</label>
            <input type="text" id="unit" name="unit" class="form-control" placeholder="e.g. %, count">
        </div>
        <div class="form-group">
            <label for="department_id">Department</label>
            <select id="department_id" name="department_id" class="form-control">
                <option value="">—</option>
                {% for d in departments %}
                <option value="{{ d.id }}">{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('kpi.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
