{% extends "base.html" %}
{% block title %}Give feedback{% endblock %}
{% block content %}
<div class="page-header reveal">
    <h1 class="page-title">Give feedback</h1>
    <p class="page-subtitle">Share constructive feedback with a colleague</p>
</div>
<div class="form-page-center">
    <div class="card reveal form-card-narrow">
        <form method="post" action="{{ url_for('feedback.give') }}">
            <div class="form-group">
                <label for="recipient_id">Recipient</label>
                <select id="recipient_id" name="recipient_id" class="form-control" required>
                    <option value="">Select person</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.full_name }} ({{ u.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="feedback_type">Type</label>
                <select id="feedback_type" name="feedback_type" class="form-control">
                    <option value="peer">Peer</option>
                    <option value="manager">Manager</option>
                    <option value="subordinate">Subordinate</option>
                </select>
            </div>
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <input type="number" id="rating" name="rating" class="form-control" min="1" max="5" value="4">
            </div>
            <div class="form-group">
                <label for="comment">Comment</label>
                <textarea id="comment" name="comment" class="form-control" placeholder="Your feedback..."></textarea>
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="is_anonymous"> Send anonymously</label>
            </div>
            <div class="flex gap-2">
                <button type="submit" class="btn btn-primary">Submit feedback</button>
                <a href="{{ url_for('feedback.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
